services:
  mediapipe:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mediapipe_worker
    volumes:
      - ./app:/workspace/app
      - ./data/input:/workspace/input
      - ./data/output:/workspace/output
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: mi_n8n
    ports:
      - "5678:5678"
    environment:
      - TZ=America/Bogota
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  n8n_data: